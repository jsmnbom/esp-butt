name: Firmware

on:
  push:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esp-butt

    steps:
      - name: Check out esp-butt
        uses: actions/checkout@v4
        with:
          path: esp-butt

      - name: Install espup and Xtensa Rust toolchain
        working-directory: ${{ github.workspace }}
        run: |
          curl -LO "https://github.com/esp-rs/espup/releases/download/v0.17.1/espup-x86_64-unknown-linux-gnu"
          chmod a+x espup-x86_64-unknown-linux-gnu
          ./espup-x86_64-unknown-linux-gnu install --targets esp32s3 --toolchain-version 1.93.0.0

      - name: Cache ldproxy
        id: cache-ldproxy
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/ldproxy
          key: ldproxy-${{ runner.os }}

      - name: Install ldproxy
        if: steps.cache-ldproxy.outputs.cache-hit != 'true'
        run: cargo install ldproxy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('esp-butt/Cargo.lock') }}
          restore-keys: cargo-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: esp-butt/target
          key: target-esp32s3-${{ hashFiles('esp-butt/Cargo.lock') }}
          restore-keys: target-esp32s3-

      - name: Build firmware
        run: |
          . "$HOME/export-esp.sh"
          cargo +esp build --target xtensa-esp32s3-espidf
