name: Firmware

on:
  push:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esp-butt

    steps:
      - name: Check out esp-butt
        uses: actions/checkout@v4
        with:
          path: esp-butt

      - name: Install Xtensa Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1
        with:
          version: 1.93.0.0
          buildtargets: esp32s3
          ldproxy: true

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('esp-butt/Cargo.lock') }}
          restore-keys: cargo-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: esp-butt/target
          key: target-esp32s3-${{ hashFiles('esp-butt/Cargo.lock') }}
          restore-keys: target-esp32s3-

      - name: Build firmware
        run: cargo +esp build --target xtensa-esp32s3-espidf"
