[package]
name = "esp-butt"
version = "0.1.0"
authors = ["Jasmin Bom <jsmnbom@gmail.com>"]
edition = "2024"
rust-version = "1.87"

[[bin]]
name = "esp-butt"
harness = false # do not use the built-in cargo test harness -> resolve rust-analyzer errors

[profile.release]
opt-level = "s"

[profile.dev]
debug = true    # Symbols are nice, and they don't increase the size on Flash
opt-level = "z"

[features]
default = []

[dependencies]
log = "0.4"
esp-idf-svc = "0.51"
futures = "0.3"
async-trait = "0.1"
uuid = "1"
futures-util = "0.3.31"
tokio = { version = "1.49.0", features = ["sync"] }
async-io = "2.6.0"
tracing = "0.1.37"
tracing-log="0.2.0"
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "tracing-log"] }
anyhow = "=1.0.101"
bt-hci = { version = "0.8.0", features = ["uuid"] }
buttplug_core = { version = "10.0.0", default-features = false}
buttplug_client = { version = "10.0.0" }
buttplug_server = { version = "10.0.0" }
buttplug_server_device_config = { version = "10.0.0" }
buttplug_client_in_process = { version = "10.0.0", default-features = false }
postcard = { version = "1.1.3", default-features = false, features = ["use-std"] }
zerocopy={version="0.8", features=["derive"]}
strum = { version = "0.27", features = ["derive"] }
compact_str = "0.9"
smallvec = "1.15"
allocator-api2 = "0.2"
hashbrown = "0.16"
bitflags = "2.11"

[build-dependencies]
embuild = "0.33"
anyhow = "=1.0.101"
buttplug_server_device_config = { version = "10.0.0" }
postcard = { version = "1.1.3", default-features = false, features = ["use-std"] }

[patch.crates-io]
buttplug_core = { path = "../buttplug/crates/buttplug_core" }
buttplug_client = { path = "../buttplug/crates/buttplug_client" }
buttplug_server = { path = "../buttplug/crates/buttplug_server" }
buttplug_server_device_config = { path = "../buttplug/crates/buttplug_server_device_config" }
buttplug_client_in_process = { path = "../buttplug/crates/buttplug_client_in_process" }
