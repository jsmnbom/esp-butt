[build]
# target = "xtensa-esp32s3-espidf"
target = "x86_64-unknown-linux-gnu"

[target.xtensa-esp32s3-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = [
  "--cfg",
  "espidf_time64"
]

[unstable]
build-std = ["std", "panic_abort"]
build-std-features = []

[env]
MCU = "esp32s3"
ESP_IDF_VERSION = "v5.5.3"
